name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=%23f472b6&color_dots=#ebedf0,#fbcfe8,#f9a8d4,#ec4899,#f472b6&color_background=%230d0010
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23f472b6&color_dots=#161b22,#3b0764,#6b21a8,#a21caf,#f472b6&color_background=%230d0010
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
