name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=%23f472b6&color_dots=%23ebedf0,%23fbcfe8,%23f9a8d4,%23ec4899,%23f472b6&color_background=%230d0010
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23f472b6&color_dots=%23161b22,%233b0764,%236b21a8,%23a21caf,%23f472b6&color_background=%230d0010

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
