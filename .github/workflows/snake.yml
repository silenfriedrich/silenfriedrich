name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=%23e5e7eb&color_dots=%23222,%23555,%23888,%23bbb,%23e5e7eb&color_background=%23111111
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23e5e7eb&color_dots=%231a1a1a,%23333,%23555,%23888,%23e5e7eb&color_background=%23111111
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push snake to output branch
        run: |
          sudo chown -R $USER:$USER dist
          cd dist
          git init
          git checkout -b output
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update dev snake animation"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git output
