name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=%23e5e7eb&color_dots=#222,#555,#888,#bbb,#e5e7eb&color_background=%23111111
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23e5e7eb&color_dots=#1a1a1a,#333,#555,#888,#e5e7eb&color_background=%23111111
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
